<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎵 Nostr Playlists - Discover Music on the Decentralized Web</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        color: #333;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
        color: white;
      }

      .header h1 {
        font-size: 3rem;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      .header p {
        font-size: 1.2rem;
        opacity: 0.9;
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 30px;
        flex-wrap: wrap;
      }

      .btn {
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 12px 24px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
      }

      .btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .create-playlist-btn {
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .create-playlist-btn:hover {

      .status {

        margin-bottom: 20px;
        padding: 15px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: white;
        backdrop-filter: blur(10px);
      }

      .playlists-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 25px;
        margin-top: 20px;
      }

      .playlist-card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
      }

      .playlist-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
      }

      .playlist-header {

        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 2px solid #f0f0f0;
      }

      .playlist-icon {

        margin-right: 15px;

      .playlist-info h3 {

        margin-bottom: 5px;
        font-size: 1.3rem;
      }

      .playlist-meta {

        font-size: 0.9rem;
      }

      .d-tag {
        color: #667eea;
        font-weight: 500;
        font-size: 0.85rem;
      }

      .pubkey {
        color: #764ba2;
        font-weight: 500;
        font-size: 0.85rem;
        font-family: 'Courier New', monospace;

      .pubkey-link {
        color: #764ba2;
        font-weight: 500;
        font-size: 0.85rem;
        font-family: 'Courier New', monospace;
        text-decoration: none;
        transition: all 0.2s ease;
        display: inline-block;

      .pubkey-link:hover {

        transform: translateX(2px);
      }

      .pubkey-link .pubkey {
        color: inherit;
        font-weight: inherit;
        font-size: inherit;
        font-family: inherit;

  <body>
    <div class="container">
      <div class="header">
        <h1>🎵 Nostr Playlists</h1>
        <p>Discover decentralized music playlists from the Nostr network</p>
      </div>

      <div class="controls">
        <button class="btn" id="fetchBtn">🔄 Fetch Latest Playlists</button>
        <button class="btn" id="clearBtn">🗑️ Clear Playlists</button>
        <a
          href="https://mp3url.org/create.html"
          target="_blank"
          class="btn create-playlist-btn"
        >
          ➕ Create Playlist
        </a>
      </div>

      <div class="relay-status" id="relayStatus"></div>

      <div class="status" id="status">
        Click "Fetch Latest Playlists" to discover music from the Nostr network
      </div>

      <div class="playlists-grid" id="playlistsGrid"></div>
    </div>

    <script>
      class NostrPlaylistApp {
        constructor() {
          this.relays = [
            'wss://relay.damus.io',
            'wss://nos.lol',
            'wss://relay.nostr.band',
            'wss://nostr-pub.wellorder.net'
          ]
          this.connections = new Map()
          this.playlists = new Map()
          this.editedPlaylists = new Map()
          this.subscriptionId = 'playlist-sub-' + Date.now()

          this.initializeElements()
          this.bindEvents()
          this.updateRelayStatus()
          this.loadDrafts()

          // Auto-fetch playlists on startup
          setTimeout(() => this.fetchPlaylists(), 500)
        }

        initializeElements() {
          this.fetchBtn = document.getElementById('fetchBtn')
          this.clearBtn = document.getElementById('clearBtn')
          this.status = document.getElementById('status')
          this.playlistsGrid = document.getElementById('playlistsGrid')
          this.relayStatus = document.getElementById('relayStatus')
        }

        bindEvents() {
          this.fetchBtn.addEventListener('click', () => this.fetchPlaylists())
          this.clearBtn.addEventListener('click', () => this.clearPlaylists())
        }

        updateRelayStatus() {
          this.relayStatus.innerHTML = this.relays
            .map(relay => {
              const isConnected =
                this.connections.has(relay) &&
                this.connections.get(relay).readyState === WebSocket.OPEN
              return `<div class="relay-indicator ${
                isConnected ? 'relay-connected' : 'relay-disconnected'
              }">
                        ${relay.replace('wss://', '')} ${
                isConnected ? '🟢' : '🔴'
              }
                    </div>`
            })
            .join('')
        }

        async fetchPlaylists() {
          this.fetchBtn.disabled = true
          this.showLoading()
          this.playlists.clear()

          try {
            await this.connectToRelays()
            this.subscribeToPlaylists()
          } catch (error) {
            this.showError(
              'Failed to connect to Nostr relays: ' + error.message
            )
            this.fetchBtn.disabled = false
          }
        }

        async connectToRelays() {
          const connectionPromises = this.relays.map(relay =>
            this.connectToRelay(relay)
          )
          await Promise.allSettled(connectionPromises)
          this.updateRelayStatus()
        }

        connectToRelay(relayUrl) {
          return new Promise((resolve, reject) => {
            try {
              const ws = new WebSocket(relayUrl)

              ws.onopen = () => {
                console.log(`Connected to ${relayUrl}`)
                this.connections.set(relayUrl, ws)
                this.updateRelayStatus()
                resolve(ws)
              }

              ws.onmessage = event => {
                this.handleMessage(JSON.parse(event.data))
              }

              ws.onerror = error => {
                console.error(`Error connecting to ${relayUrl}:`, error)
                reject(error)
              }

              ws.onclose = () => {
                console.log(`Disconnected from ${relayUrl}`)
                this.connections.delete(relayUrl)
                this.updateRelayStatus()
              }

              // Timeout after 5 seconds
              setTimeout(() => {
                if (ws.readyState !== WebSocket.OPEN) {
                  ws.close()
                  reject(new Error(`Timeout connecting to ${relayUrl}`))
                }
              }, 5000)
            } catch (error) {
              reject(error)
            }
          })
        }

        subscribeToPlaylists() {
          const subscription = [
            'REQ',
            this.subscriptionId,
            {
              kinds: [32100],
              limit: 50
            }
          ]

          this.connections.forEach((ws, relay) => {
            if (ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify(subscription))
              console.log(`Sent subscription to ${relay}`)
            }
          })

          // Auto-close subscription after 10 seconds
          setTimeout(() => {
            this.closeSubscription()
          }, 10000)
        }

        closeSubscription() {
          const closeMsg = ['CLOSE', this.subscriptionId]
          this.connections.forEach(ws => {
            if (ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify(closeMsg))
            }
          })

          this.fetchBtn.disabled = false
          this.updateStatus()
        }

        handleMessage(message) {
          const [type, subId, event] = message

          if (type === 'EVENT' && subId === this.subscriptionId) {
            this.processPlaylistEvent(event)
          } else if (type === 'EOSE') {
            console.log('End of stored events received')
          }
        }

        processPlaylistEvent(event) {
          if (event.kind === 32100 && event.content) {
            const playlistId = event.id

            if (!this.playlists.has(playlistId)) {
              const playlist = this.parseM3UPlaylist(event.content, event)
              if (playlist.tracks.length > 0) {
                this.playlists.set(playlistId, playlist)
                this.renderPlaylist(playlist)
                this.updateStatus()
              }
            }
          }
        }

        parseM3UPlaylist(content, event) {
          const lines = content.split('\n').filter(line => line.trim())
          const tracks = []
          let currentTrack = {}

          for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim()

            if (line.startsWith('#EXTINF:')) {
              // Parse track info
              const match = line.match(
                /#EXTINF:(-?\d+)(?:\s+tvg-logo="([^"]*)")?(?:\s+group-title="([^"]*)")?,(.+)/
              )
              if (match) {
                currentTrack = {
                  duration: match[1],
                  logo: match[2] || '',
                  group: match[3] || 'Unknown',
                  title: match[4] || 'Unknown Track'
                }
              }
            } else if (line.startsWith('http')) {
              // This is the URL for the current track
              if (currentTrack.title) {
                currentTrack.url = line
                tracks.push({ ...currentTrack })
                currentTrack = {}
              }
            }
          }

          // Get playlist name and d tag from tags
          const dTag = event.tags.find(tag => tag[0] === 'd')
          const altTag = event.tags.find(tag => tag[0] === 'alt')
          const playlistName = altTag
            ? altTag[1]
            : dTag
            ? dTag[1]
            : 'Unnamed Playlist'

          return {
            id: event.id,
            name: playlistName,
            dTag: dTag ? dTag[1] : null,
            pubkey: event.pubkey,
            created_at: event.created_at,
            tracks: tracks
          }
        }

        renderPlaylist(playlist, isEdited = false) {
          const playlistCard = document.createElement('div')
          playlistCard.className = 'playlist-card'
          playlistCard.setAttribute('data-playlist-id', playlist.id)

          // Create shortened pubkey (first 8 and last 4 characters)
          const shortPubkey =
            playlist.pubkey.slice(0, 8) + '...' + playlist.pubkey.slice(-4)

          playlistCard.innerHTML = `
                    <div class="playlist-header">
                        <div class="playlist-icon">🎵</div>
                        <div class="playlist-info">
                            <h3>${this.escapeHtml(playlist.name)}</h3>
                            <div class="playlist-meta">
                                ${playlist.tracks.length} tracks • ${new Date(
            playlist.created_at * 1000
          ).toLocaleDateString()}
                                ${
                                  playlist.dTag
                                    ? `<br><span class="d-tag">🏷️ ${this.escapeHtml(
                                        playlist.dTag
                                      )}</span>`
                                    : ''
                                }
                                <br><a href="https://nostr.rocks/users/${
                                  playlist.pubkey
                                }" target="_blank" class="pubkey-link">
                                    <span class="pubkey">👤 ${shortPubkey}</span>
                                </a>
                            </div>
                        </div>
                    </div>
                    <div class="tracks-list">
                        ${playlist.tracks
                          .map(
                            (track, index) => `
                            <div class="track-item" onclick="app.playTrack('${
                              track.url
                            }', '${this.escapeHtml(track.title)}')">
                                <div class="track-controls">
                                    <button class="track-control-btn" onclick="event.stopPropagation(); app.moveTrack('${playlist.id}', ${index}, ${Math.max(0, index - 1)})" title="Move Up">⬆</button>
                                    <button class="track-control-btn" onclick="event.stopPropagation(); app.moveTrack('${playlist.id}', ${index}, ${Math.min(playlist.tracks.length - 1, index + 1)})" title="Move Down">⬇</button>
                                    <button class="track-control-btn remove" onclick="event.stopPropagation(); app.removeTrack('${playlist.id}', ${index})" title="Remove">❌</button>
                                </div>
                                <div class="track-thumbnail">
                                    ${
                                      track.logo
                                        ? `<img src="${
                                            track.logo
                                          }" alt="${this.escapeHtml(
                                            track.title
                                          )}" onerror="this.classList.add('error')">`
                                        : ''
                                    }
                                </div>
                                <div class="track-info">
                                    <div class="track-title">${this.escapeHtml(
                                      track.title
                                    )}</div>
                                    <div class="track-group">${this.escapeHtml(
                                      track.group
                                    )}</div>
                                </div>
                                <button class="play-btn" onclick="event.stopPropagation(); app.playTrack('${
                                  track.url
                                }', '${this.escapeHtml(track.title)}')">
                                    ▶️
                                </button>
                            </div>
                        `
                          )
                          .join('')}
                    </div>
                    <div class="edit-controls">
                        <label>Playlist Name:</label>
                        <input type="text" class="edit-input edit-name-input" value="${this.escapeHtml(playlist.name)}" onchange="app.updatePlaylistMetadata('${playlist.id}', 'name', this.value)">
                        
                        <label>Playlist Tag:</label>
                        <input type="text" class="edit-input edit-dtag-input" value="${this.escapeHtml(playlist.dTag || '')}" onchange="app.updatePlaylistMetadata('${playlist.id}', 'dTag', this.value)">
                        
                        <div class="add-track-section">
                            <label>Add New Track:</label>
                            <input type="text" class="edit-input track-title-input" placeholder="Track Title" id="title-${playlist.id}">
                            <input type="text" class="edit-input track-url-input" placeholder="Track URL" id="url-${playlist.id}">
                            <input type="text" class="edit-input track-group-input" placeholder="Group/Artist" id="group-${playlist.id}">
                            <button class="add-track-btn" onclick="app.addNewTrack('${playlist.id}')">➕ Add Track</button>
                        </div>
                        
                        <div class="edit-actions">
                            <button class="save-draft-btn" onclick="app.saveDrafts(); app.showStatus('💾 Draft saved!')">💾 Save Draft</button>
                            <button class="export-btn" onclick="app.exportEditedPlaylist('${playlist.id}')">📤 Export M3U</button>
                        </div>
                    </div>
                    <button class="download-btn" onclick="app.downloadM3U(${isEdited ? 'app.editedPlaylists' : 'app.playlists'}.get('${playlist.id}'))">
                        📥 Download .m3u
                    </button>
                    <button class="edit-btn" onclick="app.toggleEditMode('${playlist.id}')">
                        ✏️ Edit Playlist
                    </button>
                `

          this.playlistsGrid.appendChild(playlistCard)
        }

        playTrack(url, title) {
          // Create a simple audio player or open in new tab
          if (url.includes('.mp4') || url.includes('video')) {
            // For video files, open in new tab
            window.open(url, '_blank')
          } else {
            // For audio files, try to play inline
            const audio = new Audio(url)
            audio.play().catch(error => {
              console.error('Error playing audio:', error)
              // Fallback to opening in new tab
              window.open(url, '_blank')
            })
          }

          this.showStatus(`🎵 Playing: ${title}`)
        }

        clearPlaylists() {
          this.playlists.clear()
          this.playlistsGrid.innerHTML = ''
          this.showStatus('Playlists cleared')
        }

        showLoading() {
          this.status.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>Fetching playlists from Nostr relays...</div>
                    </div>
                `
        }

        showError(message) {
          this.status.innerHTML = `<div class="error">❌ ${message}</div>`
        }

        showStatus(message) {
          this.status.innerHTML = message
        }

        updateStatus() {
          const count = this.playlists.size
          if (count === 0) {
            this.showStatus(
              'No playlists found. Try fetching again or check relay connections.'
            )
          } else {
            this.showStatus(
              `🎉 Found ${count} playlist${
                count !== 1 ? 's' : ''
              } from the Nostr network!`
            )
          }
        }

        escapeHtml(text) {
          const div = document.createElement('div')
          div.textContent = text
          return div.innerHTML
        }

        generateM3UFile(playlist) {
          let m3uContent = '#EXTM3U\n'
          m3uContent += `# Playlist: ${playlist.name}\n`
          m3uContent += `# Created: ${new Date(playlist.created_at * 1000).toISOString()}\n`
          if (playlist.dTag) {
            m3uContent += `# Tag: ${playlist.dTag}\n`
          }
          m3uContent += `# Original Author: ${playlist.pubkey}\n`
          
          // Add edited note if it's an edited playlist
          if (this.editedPlaylists.has(playlist.id)) {
            m3uContent += `# Edited with Nostr Playlists (nostrapps.github.io/playlists)\n`
            m3uContent += `# Last Modified: ${new Date().toISOString()}\n`
          }
          m3uContent += '\n'

          playlist.tracks.forEach(track => {
            const extinf = `#EXTINF:${track.duration || -1}`
            const tvgLogo = track.logo ? ` tvg-logo="${track.logo}"` : ''
            const groupTitle = track.group ? ` group-title="${track.group}"` : ''
            m3uContent += `${extinf}${tvgLogo}${groupTitle},${track.title}\n`
            m3uContent += `${track.url}\n`
          })

          return m3uContent
        }

        downloadM3U(playlist) {
          const m3uContent = this.generateM3UFile(playlist)
          const blob = new Blob([m3uContent], { type: 'audio/x-mpegurl' })
          const url = URL.createObjectURL(blob)
          
          const a = document.createElement('a')
          a.href = url
          a.download = `${playlist.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.m3u`
          document.body.appendChild(a)
          a.click()
          document.body.removeChild(a)
          URL.revokeObjectURL(url)
          
          this.showStatus(`📥 Downloaded: ${playlist.name}.m3u`)
        }

        loadDrafts() {
          try {
            const drafts = localStorage.getItem('playlist-drafts')
            if (drafts) {
              const parsedDrafts = JSON.parse(drafts)
              for (const [id, playlist] of Object.entries(parsedDrafts)) {
                this.editedPlaylists.set(id, playlist)
              }
            }
          } catch (error) {
            console.error('Error loading drafts:', error)
          }
        }

        saveDrafts() {
          try {
            const draftsObj = {}
            for (const [id, playlist] of this.editedPlaylists.entries()) {
              draftsObj[id] = playlist
            }
            localStorage.setItem('playlist-drafts', JSON.stringify(draftsObj))
          } catch (error) {
            console.error('Error saving drafts:', error)
          }
        }

        toggleEditMode(playlistId) {
          const card = document.querySelector(`[data-playlist-id="${playlistId}"]`)
          const editBtn = card.querySelector('.edit-btn')
          const editControls = card.querySelector('.edit-controls')
          const addTrackSection = card.querySelector('.add-track-section')
          const trackItems = card.querySelectorAll('.track-item')
          
          const isEditing = card.classList.contains('edit-mode')
          
          if (isEditing) {
            // Exit edit mode
            card.classList.remove('edit-mode')
            editBtn.classList.remove('active')
            editBtn.innerHTML = '✏️ Edit Playlist'
            editControls.classList.remove('active')
            if (addTrackSection) addTrackSection.classList.remove('active')
            trackItems.forEach(item => item.classList.remove('edit-mode'))
          } else {
            // Enter edit mode
            card.classList.add('edit-mode')
            editBtn.classList.add('active')
            editBtn.innerHTML = '❌ Cancel Edit'
            editControls.classList.add('active')
            if (addTrackSection) addTrackSection.classList.add('active')
            trackItems.forEach(item => item.classList.add('edit-mode'))
            
            // Load or create draft
            if (!this.editedPlaylists.has(playlistId)) {
              const originalPlaylist = this.playlists.get(playlistId)
              this.editedPlaylists.set(playlistId, JSON.parse(JSON.stringify(originalPlaylist)))
            }
            
            this.updateEditForm(playlistId)
          }
        }

        updateEditForm(playlistId) {
          const card = document.querySelector(`[data-playlist-id="${playlistId}"]`)
          const editedPlaylist = this.editedPlaylists.get(playlistId)
          
          const nameInput = card.querySelector('.edit-name-input')
          const dTagInput = card.querySelector('.edit-dtag-input')
          
          if (nameInput) nameInput.value = editedPlaylist.name
          if (dTagInput) dTagInput.value = editedPlaylist.dTag || ''
        }

        updatePlaylistMetadata(playlistId, field, value) {
          const editedPlaylist = this.editedPlaylists.get(playlistId)
          if (editedPlaylist) {
            editedPlaylist[field] = value
            this.saveDrafts()
          }
        }

        removeTrack(playlistId, trackIndex) {
          const editedPlaylist = this.editedPlaylists.get(playlistId)
          if (editedPlaylist && editedPlaylist.tracks[trackIndex]) {
            editedPlaylist.tracks.splice(trackIndex, 1)
            this.saveDrafts()
            this.rerenderPlaylistCard(playlistId)
          }
        }

        moveTrack(playlistId, fromIndex, toIndex) {
          const editedPlaylist = this.editedPlaylists.get(playlistId)
          if (editedPlaylist && editedPlaylist.tracks[fromIndex]) {
            const track = editedPlaylist.tracks.splice(fromIndex, 1)[0]
            editedPlaylist.tracks.splice(toIndex, 0, track)
            this.saveDrafts()
            this.rerenderPlaylistCard(playlistId)
          }
        }

        addTrack(playlistId, trackData) {
          const editedPlaylist = this.editedPlaylists.get(playlistId)
          if (editedPlaylist) {
            editedPlaylist.tracks.push(trackData)
            this.saveDrafts()
            this.rerenderPlaylistCard(playlistId)
          }
        }

        rerenderPlaylistCard(playlistId) {
          const card = document.querySelector(`[data-playlist-id="${playlistId}"]`)
          if (card) {
            const editedPlaylist = this.editedPlaylists.get(playlistId)
            card.remove()
            this.renderPlaylist(editedPlaylist, true)
            // Re-enter edit mode
            setTimeout(() => this.toggleEditMode(playlistId), 100)
          }
        }

        exportEditedPlaylist(playlistId) {
          const editedPlaylist = this.editedPlaylists.get(playlistId)
          if (editedPlaylist) {
            const m3uContent = this.generateM3UFile(editedPlaylist)
            const blob = new Blob([m3uContent], { type: 'text/plain' })
            const url = URL.createObjectURL(blob)
            
            const a = document.createElement('a')
            a.href = url
            a.download = `${editedPlaylist.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_edited.m3u`
            document.body.appendChild(a)
            a.click()
            document.body.removeChild(a)
            URL.revokeObjectURL(url)
            
            this.showStatus(`📤 Exported edited playlist: ${editedPlaylist.name}`)
          }
        }

        addNewTrack(playlistId) {
          const titleInput = document.getElementById(`title-${playlistId}`)
          const urlInput = document.getElementById(`url-${playlistId}`)
          const groupInput = document.getElementById(`group-${playlistId}`)
          
          const title = titleInput.value.trim()
          const url = urlInput.value.trim()
          const group = groupInput.value.trim() || 'Unknown'
          
          if (title && url) {
            const newTrack = {
              title: title,
              url: url,
              group: group,
              duration: -1,
              logo: ''
            }
            
            this.addTrack(playlistId, newTrack)
            
            // Clear form
            titleInput.value = ''
            urlInput.value = ''
            groupInput.value = ''
            
            this.showStatus(`➕ Added track: ${title}`)
          } else {
            this.showStatus('❌ Please enter track title and URL')
          }
        }
      }

      // Initialize the app
      const app = new NostrPlaylistApp()
    </script>
  </body>
</html>
